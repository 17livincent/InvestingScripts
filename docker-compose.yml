services:
  postgres:
    image: postgres:16-alpine
    container_name: investing-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-investing}
      POSTGRES_USER: ${POSTGRES_USER:-investing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investing}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - investing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  investing_postgres_data:
